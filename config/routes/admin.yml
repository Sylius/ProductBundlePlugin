sylius_product_bundle_admin_product_create_bundle:
    path: /products/new/bundle
    methods: [GET, POST]
    defaults:
        _controller: sylius.controller.product::createAction
        _sylius:
            section: admin
            permission: true
            factory:
                method: createWithVariantAndBundle
            template: "@SyliusAdmin/shared/crud/create.html.twig"
            redirect: sylius_admin_product_update
            form:
                type: Sylius\Bundle\AdminBundle\Form\Type\ProductType
                options:
                    validation_groups:
                        - sylius
                        - sylius_product_bundle
            vars:
                subheader: sylius.ui.manage_your_product_catalog
                templates:
                    form: "@SyliusAdmin/product/form.html.twig"
                route:
                    name: sylius_product_bundle_admin_product_create_bundle
