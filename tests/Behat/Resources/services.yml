services:
  _defaults: { public: true }

  sylius_product_bundle_plugin.behat.context.setup.product_bundle:
    class: Tests\Sylius\ProductBundlePlugin\Behat\Context\Setup\ProductBundleContext
    arguments:
      - '@sylius.behat.shared_storage'
      - '@sylius.factory.taxon'
      - '@sylius.repository.product'
      - '@sylius.factory.product_taxon'
      - '@sylius.manager.product_taxon'
      - '@sylius_product_bundle.custom_factory.product'
      - '@sylius_product_bundle.factory.product_bundle_item'
      - '@sylius.factory.channel_pricing'
      - '@sylius.resolver.product_variant.default'
      - '@sylius.generator.slug'

  sylius_product_bundle_plugin.behat.page.create_bundled_product_page:
    class: Tests\Sylius\ProductBundlePlugin\Behat\Page\Admin\CreateBundledProductPage
    parent: sylius.behat.page.admin.crud.create
    public: false
    arguments:
      - 'bitbag_product_bundle_admin_product_create_bundle'

  sylius_product_bundle_plugin.behat.context.ui.product_bundle:
    class: Tests\Sylius\ProductBundlePlugin\Behat\Context\Ui\ProductBundleContext
    arguments:
      - '@sylius_product_bundle_plugin.behat.page.create_bundled_product_page'
